# Memory Agent Regulatory — Default Configuration
# Override individual values via environment variables (see .env.example).

embeddings:
  model: "BAAI/bge-m3"
  batch_size: 32
  dimensions: 1024

chunking:
  chunk_size: 500        # tokens per chunk
  chunk_overlap: 50      # overlapping tokens between consecutive chunks

retrieval:
  top_k: 10             # over-retrieve for reranking (reranker trims to top_n)
  collection: "RegulatoryChunks"
  min_similarity: 0.35  # minimum cosine similarity (vector strategy only)
  search_strategy: "hybrid"  # "vector" | "keyword" | "hybrid"
  hybrid:
    alpha: 0.5           # 0.0 = pure BM25, 1.0 = pure vector
    fusion_type: "ranked" # "ranked" (RRF) or "relative_score"

reranking:
  enabled: true
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_n: 5              # final number of chunks after reranking

llm:
  model: "llama3.2:3b"
  temperature: 0
  top_p: 1.0
  num_ctx: 4096            # KV cache window — must be >= max_context_tokens + prompt overhead
  num_predict: 1024        # max response tokens

rag:
  max_context_tokens: 4096

weaviate:
  host: "localhost"
  port: 8080

ollama:
  host: "http://localhost:11434"

phoenix:
  host: "localhost"
  port: 6006

database:
  host: "localhost"
  port: 5432
  user: "agent"
  password: ""                   # set via POSTGRES_PASSWORD env var
  name: "agent_memory"
  echo: false

memory:
  max_history_turns: 20          # max turns returned by get_history
  summary_threshold: 15          # turns before auto-summarization triggers
  semantic_top_k: 5              # top-k results for semantic memory search
  procedural_top_k: 3            # top-k results for procedural pattern search

ingestion:
  sources:
    # ── PDFs regulatórios (BCB) ────────────────────────────────────────
    - type: "pdf"
      path: "data/sources/pdf/01_manual_uso_marca_pix.pdf"
      alias: "Manual de Uso da Marca PIX"
    - type: "pdf"
      path: "data/sources/pdf/02_manual_padroes_iniciacao_pix.pdf"
      alias: "Manual de Padrões para Iniciação do PIX"
    - type: "pdf"
      path: "data/sources/pdf/03_manual_fluxos_efetivacao_pix.pdf"
      alias: "Manual de Fluxos do Processo de Efetivação do PIX"
    - type: "pdf"
      path: "data/sources/pdf/04_requisitos_minimos_experiencia_usuario.pdf"
      alias: "Requisitos Mínimos para Experiência do Usuário"
    - type: "pdf"
      path: "data/sources/pdf/05_manual_tempos_pix.pdf"
      alias: "Manual de Tempos do PIX"
    - type: "pdf"
      path: "data/sources/pdf/06_manual_operacional_dict.pdf"
      alias: "Manual Operacional do DICT"
    - type: "pdf"
      path: "data/sources/pdf/07_manual_resolucao_disputas.pdf"
      alias: "Manual de Resolução de Disputas"

    # ── FAQs (web scraping) ────────────────────────────────────────────
    - type: "web"
      url: "https://www.bcb.gov.br/meubc/faqs/s/pix"
      alias: "FAQ PIX e Transferências"
      delay: 1.5
    - type: "web"
      url: "https://www.bcb.gov.br/meubc/faqs/p/o-que-e-e-como-funciona-o-mecanismo-especial-de-devolucao-med"
      alias: "FAQ Mecanismo Especial de Devolução (MED)"
      delay: 1.5
    - type: "web"
      url: "https://www.bcb.gov.br/estabilidadefinanceira/dict"
      alias: "FAQ DICT"
      delay: 1.5

    # ── Resoluções BCB (web scraping) ──────────────────────────────────
    - type: "web"
      url: "https://www.bcb.gov.br/estabilidadefinanceira/exibenormativo?tipo=Resolu%C3%A7%C3%A3o%20BCB&numero=507"
      alias: "Resolução BCB nº 507"
      delay: 1.5
    - type: "web"
      url: "https://www.bcb.gov.br/estabilidadefinanceira/exibenormativo?tipo=Resolu%C3%A7%C3%A3o%20BCB&numero=1"
      alias: "Resolução BCB nº 1"
      delay: 1.5

  web_delay: 1.5               # default delay between web requests (seconds)

logging:
  level: "INFO"
  format: "text"              # "text" (human-readable) or "json" (structured)
